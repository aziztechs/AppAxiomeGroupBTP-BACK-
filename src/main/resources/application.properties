spring.application.name=AppAxiomeGroupBTP-BACK
server.port=8081

# Database Configuration
# Configuration de la base de données MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_btp_axiome?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# Note: Ceci est une URL de base de données de développement, à modifier en production
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
# Pour le développement, utilisez create-drop pour réinitialiser la base à chaque démarrage
# Pour la production, utilisez update ou validate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.csrf.enabled=true
springdoc.swagger-ui.server=http://localhost:8081

# JWT Configuration
app.jwt.secret=VGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIEpXVCBzaWduaW5nIC0gaXQgc2hvdWxkIGJlIGxvbmcgYW5kIGNvbXBsZXg=
app.jwt.expiration=86400000
app.jwt.issuer=AppAxiomeGroupBTP
